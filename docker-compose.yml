services:
  # ── PHP-FPM application container ─────────────────────────────────────
  app:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/vendor           # keep vendor inside the container layer
    environment:
      APP_NAME: "Book Library API"
      APP_ENV: local
      APP_KEY: base64:2fl+Ktvkfl+Ktvkfl+Ktvkfl+Ktvkfl+Ktvkfl+Ktv=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: book_library
      DB_USERNAME: app
      DB_PASSWORD: secret
      L5_SWAGGER_GENERATE_ALWAYS: "true"
      CACHE_STORE: file
      SESSION_DRIVER: file
    depends_on:
      database:
        condition: service_healthy
    networks:
      - book_library_net

  # ── Nginx reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"             # API available at http://localhost:8080
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - book_library_net

  # ── MySQL 8 database ───────────────────────────────────────────────────
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: book_library
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - book_library_net

volumes:
  db_data:

networks:
  book_library_net:
    driver: bridge
